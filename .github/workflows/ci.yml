name: "Eaquel Dumper CI"

on:
  push:
    branches: [ main, develop ]
    paths:
      - '**.cpp'
      - '**/CMakeLists.txt'
      - '**/build.gradle.kts'
      - '.github/workflows/ci.yml'
  pull_request:
    branches: [ main ]
    paths:
      - '**.cpp'
      - '**/CMakeLists.txt'
      - '**/build.gradle.kts'
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  NDK_VERSION:    "29.0.14206865"
  CMAKE_VERSION:  "4.3.2"
  JAVA_VERSION:   "25"
  GRADLE_VERSION: "9.5.1"

jobs:
  build:
    name: "Build Release"
    runs-on: ubuntu-latest
    timeout-minutes: 90

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: ${{ env.JAVA_VERSION }}

      - uses: android-actions/setup-android@v4

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4
        with:
          gradle-version: ${{ env.GRADLE_VERSION }}
          cache-read-only: false

      - name: Generate Gradle Wrapper
        run: |
          gradle wrapper --gradle-version ${{ env.GRADLE_VERSION }}
          cp Gradle/gradle-wrapper.jar gradle/wrapper/gradle-wrapper.jar
          chmod +x gradlew

      - name: Install NDK
        run: |
          yes | "$ANDROID_SDK_ROOT/cmdline-tools/latest/bin/sdkmanager" --licenses
          "$ANDROID_SDK_ROOT/cmdline-tools/latest/bin/sdkmanager" "ndk;${{ env.NDK_VERSION }}"

      - name: Install CMake from Kitware
        run: |
          CMAKE_DIR="$ANDROID_SDK_ROOT/cmake/${{ env.CMAKE_VERSION }}"
          mkdir -p "$CMAKE_DIR"
          curl -fsSL \
            "https://github.com/Kitware/CMake/releases/download/v${{ env.CMAKE_VERSION }}/cmake-${{ env.CMAKE_VERSION }}-linux-x86_64.tar.gz" \
            | tar -xz --strip-components=1 -C "$CMAKE_DIR"
          cat > "$CMAKE_DIR/package.xml" << 'XML'
          <?xml version="1.0" encoding="UTF-8" standalone="yes"?>
          <ns2:repository
            xmlns:ns2="http://schemas.android.com/repository/android/common/02"
            xmlns:ns3="http://schemas.android.com/repository/android/generic/02">
            <localPackage path="cmake;4.3.2" obsolete="false">
              <type-details xmlns:xsi="http://www.w3.org/2001/XMLSchema-instance"
                            xsi:type="ns3:genericDetailsType"/>
              <revision><major>4</major><minor>3</minor><micro>2</micro></revision>
              <display-name>CMake 4.3.2</display-name>
            </localPackage>
          </ns2:repository>
          XML
          "$CMAKE_DIR/bin/cmake" --version

      - name: Setup gradle.properties
        run: |
          cat > gradle.properties << 'PROPS'
          org.gradle.jvmargs=-Xmx6g -XX:+UseG1GC -XX:MaxMetaspaceSize=1g
          org.gradle.parallel=true
          org.gradle.caching=true
          org.gradle.daemon=true
          android.useAndroidX=true
          android.nonTransitiveRClass=true
          PROPS

      - name: Build Release
        run: |
          ./gradlew :Dumper:assembleRelease \
            --no-daemon \
            --parallel \
            --build-cache
        env:
          ANDROID_NDK_HOME: /usr/local/lib/android/sdk/ndk/${{ env.NDK_VERSION }}

      - name: Verify Output Integrity
        run: |
          ls -la out/ || true
          sha256sum out/* || true

      - uses: actions/upload-artifact@v4
        with:
          name: eaquel-dumper-release
          retention-days: 14
          compression-level: 9
          if-no-files-found: error
          path: out/
