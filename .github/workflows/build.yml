name: Build

on:
  workflow_dispatch:
    inputs:
      package_name:
        description: "Target Application Package Name"
        required: true
      build_variant:
        description: "Build variant"
        required: false
        default: "release"
        type: choice
        options:
          - release
          - debug

jobs:
  build:
    name: Build Eaquel_Dumper
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 1

      - name: Setup Java
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: 21
          cache: gradle

      - name: Setup Android
        uses: android-actions/setup-android@v4
        with:
          packages: ""

      - name: Cache
        uses: actions/cache@v4
        with:
          path: |
            /usr/local/lib/android/sdk/ndk/29.0.14206865
            /usr/local/lib/android/sdk/cmake/3.22.1
          key: android-ndk-29.0.14206865-cmake-3.22.1

      - name: Install Manager
        run: |
          sdkmanager "ndk;29.0.14206865" "cmake;3.22.1"

      - name: Grant Permissions
        run: chmod +x ./gradlew

      - name: Inject Target
        run: |
          sed -i 's/#define GamePackageName "[^"]*"/#define GamePackageName "${{ github.event.inputs.package_name }}"/' Dumper/Source/Main/Native/Target.h
          sed -i 's/val moduleDescription by extra(".*")/val moduleDescription by extra("[${{ github.event.inputs.package_name }}] Runtime ELF integrity analysis and binary resolver for AOSP.")/' module.gradle.kts

      - name: Building
        run: |
          VARIANT="${{ github.event.inputs.build_variant }}"
          VARIANT_CAPPED="$(echo ${VARIANT:0:1} | tr '[:lower:]' '[:upper:]')${VARIANT:1}"
          ./gradlew :Dumper:assemble${VARIANT_CAPPED} --no-daemon --stacktrace

      - name: Upload Dumper
        uses: actions/upload-artifact@v4
        with:
          name: eaquel-dumper-${{ github.event.inputs.package_name }}-${{ github.event.inputs.build_variant }}
          path: out/skeleton_${{ github.event.inputs.build_variant }}/
          retention-days: 7
          compression-level: 9

      - name: Upload Folder
        uses: actions/upload-artifact@v4
        with:
          name: eaquel-dumper-zip-${{ github.event.inputs.build_variant }}
          path: out/*.zip
          retention-days: 7