name: "🦊 Eaquel Dumper — Ultimate Build Pipeline"

on:
  workflow_dispatch:

env:
  NDK_VERSION:   "29.0.14206865"
  CMAKE_VERSION: "4.3.1"
  JAVA_VERSION:  "21"
  CACHE_VER:     "v8"

jobs:
  build:
    name: "🏗️ Eaquel Dumper · Release"
    runs-on: ubuntu-24.04

    steps:
      - name: "📥 Checkout Repository"
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: "☕ Setup Java 21"
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: ${{ env.JAVA_VERSION }}
          cache: gradle

      - name: "📦 Setup Android SDK"
        uses: android-actions/setup-android@v4

      - name: "🔄 Cache CMake"
        id: cache-cmake
        uses: actions/cache@v4
        with:
          path: /opt/cmake-${{ env.CMAKE_VERSION }}
          key: cmake-${{ env.CMAKE_VERSION }}-${{ env.CACHE_VER }}

      - name: "🛠️ Install CMake ${{ env.CMAKE_VERSION }}"
        if: steps.cache-cmake.outputs.cache-hit != 'true'
        run: |
          echo "Downloading CMake ${{ env.CMAKE_VERSION }}..."
          CMAKE_URL="https://github.com/Kitware/CMake/releases/download/v${{ env.CMAKE_VERSION }}/cmake-${{ env.CMAKE_VERSION }}-linux-x86_64.tar.gz"
          wget -q --show-progress "$CMAKE_URL" -O cmake.tar.gz
          tar -xzf cmake.tar.gz
          sudo mv cmake-${{ env.CMAKE_VERSION }}-linux-x86_64 /opt/cmake-${{ env.CMAKE_VERSION }}
          cmake --version

      - name: "📌 Write local.properties"
        run: |
          echo "cmake.dir=/opt/cmake-${{ env.CMAKE_VERSION }}" >> local.properties
          echo "sdk.dir=$ANDROID_SDK_ROOT"                    >> local.properties
          cat local.properties

      - name: "🔄 Cache NDK"
        id: cache-ndk
        uses: actions/cache@v4
        with:
          path: /usr/local/lib/android/sdk/ndk/${{ env.NDK_VERSION }}
          key: ndk-${{ env.NDK_VERSION }}-${{ env.CACHE_VER }}

      - name: "🛠️ Install NDK"
        if: steps.cache-ndk.outputs.cache-hit != 'true'
        run: sdkmanager --install "ndk;${{ env.NDK_VERSION }}"

      - name: "🔑 Make gradlew executable"
        run: chmod +x ./gradlew

      - name: "🏗️ Build Release"
        run: |
          ./gradlew :Dumper:assembleRelease \
            --no-daemon --stacktrace --build-cache --parallel
        env:
          GRADLE_OPTS: "-Xmx6g -XX:+HeapDumpOnOutOfMemoryError"

      - name: "📤 Upload Artifact"
        uses: actions/upload-artifact@v4
        with:
          name: eaquel-dumper-release-r${{ github.run_number }}
          path: out/
          retention-days: 30
          compression-level: 9

      - name: "📋 Build Summary"
        if: always()
        run: |
          echo "## 🦊 Eaquel Dumper Build Summary" >> $GITHUB_STEP_SUMMARY
          echo "| Field       | Value                          |" >> $GITHUB_STEP_SUMMARY
          echo "|-------------|--------------------------------|" >> $GITHUB_STEP_SUMMARY
          echo "| Variant     | Release                        |" >> $GITHUB_STEP_SUMMARY
          echo "| Runner      | ubuntu-24.04                   |" >> $GITHUB_STEP_SUMMARY
          echo "| NDK         | ${{ env.NDK_VERSION }}         |" >> $GITHUB_STEP_SUMMARY
          echo "| CMake       | ${{ env.CMAKE_VERSION }}       |" >> $GITHUB_STEP_SUMMARY
          echo "| Java        | Temurin ${{ env.JAVA_VERSION }}|" >> $GITHUB_STEP_SUMMARY
          echo "| Run Number  | #${{ github.run_number }}      |" >> $GITHUB_STEP_SUMMARY
