name: "🦊 Eaquel Dumper — Build Pipeline"

on:
  workflow_dispatch:

env:
  NDK_VERSION: "29.0.14206865"
  CMAKE_VERSION: "4.0.0"
  JAVA_VERSION: "21"
  CACHE_VER: "v4"

jobs:
  build:
    name: "🏗️ Assemble Release"
    runs-on: ubuntu-24.04

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: ${{ env.JAVA_VERSION }}
          cache: gradle

      - uses: android-actions/setup-android@v3
        with:
          cmdline-tools-version: latest

      - id: cache-ndk
        uses: actions/cache@v4
        with:
          path: /usr/local/lib/android/sdk/ndk/${{ env.NDK_VERSION }}
          key: ndk-${{ env.NDK_VERSION }}-${{ env.CACHE_VER }}

      - id: cache-cmake
        uses: actions/cache@v4
        with:
          path: /usr/local/lib/android/sdk/cmake/${{ env.CMAKE_VERSION }}
          key: cmake-${{ env.CMAKE_VERSION }}-${{ env.CACHE_VER }}

      - run: |
          sdkmanager --install "ndk;${{ env.NDK_VERSION }}" "cmake;${{ env.CMAKE_VERSION }}"
        if: steps.cache-ndk.outputs.cache-hit != 'true' || steps.cache-cmake.outputs.cache-hit != 'true'

      - run: chmod +x ./gradlew

      - run: |
          ./gradlew :Dumper:assembleRelease \
            --no-daemon --stacktrace --build-cache --parallel
        env:
          GRADLE_OPTS: "-Xmx6g -XX:+HeapDumpOnOutOfMemoryError"

      - uses: actions/upload-artifact@v4
        with:
          name: eaquel-dumper-release
          path: out/
          retention-days: 30
          compression-level: 9

      - if: always()
        run: |
          echo "## 🦊 Eaquel Dumper Build Summary" >> $GITHUB_STEP_SUMMARY
          echo "| Field | Value |" >> $GITHUB_STEP_SUMMARY
          echo "|-------|-------|" >> $GITHUB_STEP_SUMMARY
          echo "| Variant | Release |" >> $GITHUB_STEP_SUMMARY
          echo "| NDK | ${{ env.NDK_VERSION }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Status | Success |" >> $GITHUB_STEP_SUMMARY
