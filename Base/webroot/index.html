<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Eaquel Dumper</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.6.0/css/all.min.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@300;400;500;700;800&family=Orbitron:wght@500;700;900&display=swap');
        :root{--red:#ff0000;--glow:rgba(255,0,0,0.9);--panel:#080000;--border:rgba(255,0,0,0.55)}
        *{box-sizing:border-box}body{font-family:'JetBrains Mono',monospace;background:#040000;color:#ddd;height:100dvh;overflow:hidden;margin:0}
        .crt{position:relative;overflow:hidden}
        .crt::before{content:'';position:fixed;inset:0;background:linear-gradient(rgba(255,0,0,0.05)1px,transparent 1px),linear-gradient(90deg,rgba(255,0,0,0.05)1px,transparent 1px);background-size:24px 24px;pointer-events:none;z-index:-1;animation:scanline 2.5s linear infinite}
        .crt::after{content:'';position:fixed;inset:0;background:radial-gradient(circle at center,rgba(255,0,0,0.22) 20%,transparent 80%);pointer-events:none;z-index:-1;animation:flicker 2.5s infinite alternate}
        @keyframes scanline{0%{background-position:0 0}100%{background-position:0 160px}}
        @keyframes flicker{0%,100%{opacity:1}50%{opacity:0.82}}
        .glow{text-shadow:0 0 30px var(--glow)}
        .panel{background:var(--panel);border:1px solid var(--border);border-radius:22px;box-shadow:0 25px 50px rgba(255,0,0,0.25),inset 0 0 45px rgba(255,0,0,0.2)}
        .card{transition:all .4s cubic-bezier(0.34,1.56,0.64,1)}
        .card:hover{transform:scale(1.12) rotate(2deg);box-shadow:0 0 50px var(--glow)}
        .btn-primary{background:linear-gradient(135deg,#3d0000,#ff1a1a);box-shadow:0 0 45px var(--glow)}
        .btn-primary:active{transform:scale(0.85)}
        .nav-btn{color:#888;transition:all .4s cubic-bezier(0.4,0,0.2,1)}
        .nav-btn.active{color:#ff0000;text-shadow:0 0 30px var(--glow);transform:scale(1.3)}
        .term{font-size:13.5px;line-height:1.7;font-family:'JetBrains Mono',monospace;background:#020000}
    </style>
</head>
<body class="crt flex flex-col">

<header class="bg-black border-b border-red-900/80 px-6 py-5 flex items-center justify-between flex-shrink-0">
    <div class="flex items-center gap-4">
        <i class="fa-solid fa-ghost text-4xl text-red-600 glow"></i>
        <div>
            <h1 class="text-3xl font-black tracking-[5px] text-white">EAQUEL</h1>
            <p class="text-xs text-red-500 font-bold tracking-[4px]">IL2CPP • ZYGISK v4</p>
        </div>
    </div>
    <div id="root-badge" onclick="retryBoot()" class="px-7 py-2.5 rounded-3xl text-xs font-bold flex items-center gap-3 bg-red-950 text-red-400 cursor-pointer hover:bg-red-900">
        <i class="fa-solid fa-circle animate-pulse"></i> ROOT KONTROL
    </div>
</header>

<main class="flex-1 overflow-y-auto p-5 space-y-6" id="main"></main>

<nav class="bg-black border-t border-red-900 px-5 py-4 flex justify-around flex-shrink-0">
    <button onclick="switchTab(0)" class="nav-btn active flex flex-col items-center gap-1 w-16"><i class="fa-solid fa-crosshairs text-3xl"></i><span class="text-xs font-bold">TARGET</span></button>
    <button onclick="switchTab(1)" class="nav-btn flex flex-col items-center gap-1 w-16"><i class="fa-solid fa-sliders text-3xl"></i><span class="text-xs font-bold">CONFIG</span></button>
    <button onclick="switchTab(2)" class="nav-btn flex flex-col items-center gap-1 w-16"><i class="fa-solid fa-download text-3xl"></i><span class="text-xs font-bold">EXTRACT</span></button>
    <button onclick="switchTab(3)" class="nav-btn flex flex-col items-center gap-1 w-16"><i class="fa-solid fa-terminal text-3xl"></i><span class="text-xs font-bold">TERM</span></button>
</nav>

<div id="toast" onclick="this.style.display='none'" class="hidden fixed bottom-16 left-1/2 -translate-x-1/2 px-8 py-4 rounded-3xl text-sm font-medium shadow-2xl border z-[9999]"></div>

<script>
const state = {root:false,bridge:null,target:null,apps:[],query:"",config:{outputDir:"/sdcard/EaquelDumps",genCpp:true,genFrida:true,autoKill:true},logs:[]};

const Bridge = {
    detect(){
        if(window.kitsune)return"kitsune";
        if(window.ksu)return"ksu";
        if(window.kernelsu)return"kernelsu";
        if(window.mmrl)return"mmrl";
        if(window.magisk)return"magisk";
        if(window.apatch)return"apatch";
        return null;
    },
    async godRun(c){
        const t = this.detect();
        if(!t) return "";
        try{
            let r = "";
            if(t==="kitsune"){
                r = (await window.kitsune.exec(c)).stdout || "";
                if(!r || r.includes("Permission denied") || r.includes("not found")){
                    r = await this.fallback(c);
                }
                return r;
            }
            if(t==="ksu")      r = (await window.ksu.exec(c)).stdout || "";
            else if(t==="kernelsu") r = (await window.kernelsu.exec(c)).stdout || "";
            else if(t==="mmrl")     r = await window.mmrl.exec(c) || "";
            else if(t==="magisk")   r = (await window.magisk.exec(c)).stdout || "";
            else if(t==="apatch")   r = (await window.apatch.exec(c)).stdout || "";
            if(!r || r.includes("Permission denied") || r.includes("not found")){
                r = await this.fallback(c);
            }
            return r;
        }catch(e){return "[ERR] "+e.message;}
    },
    async fallback(c){
        try{
            return await this.exec("nsenter -t 1 -m sh -c '" + c.replace(/'/g,"'\\''") + "' 2>/dev/null") ||
                   await this.exec("su -mm -c '" + c.replace(/'/g,"'\\''") + "' 2>/dev/null");
        }catch(e){return "";}
    },
    async exec(c){
        const t = this.detect();
        if(!t) return "";
        try{
            if(t==="kitsune") return (await window.kitsune.exec(c)).stdout || "";
            if(t==="ksu") return (await window.ksu.exec(c)).stdout || "";
            if(t==="kernelsu") return (await window.kernelsu.exec(c)).stdout || "";
            if(t==="mmrl") return await window.mmrl.exec(c) || "";
            if(t==="magisk") return (await window.magisk.exec(c)).stdout || "";
            if(t==="apatch") return (await window.apatch.exec(c)).stdout || "";
            return "";
        }catch(e){return "[ERR] "+e.message;}
    }
};

const Toast = {show(m){const t=document.getElementById("toast");t.textContent=m;t.className="fixed bottom-16 left-1/2 -translate-x-1/2 px-8 py-4 rounded-3xl text-sm font-medium border " + (m.includes("OK")||m.includes("bulundu")||m.includes("çekildi")?"border-green-500 bg-green-950 text-green-300":"border-red-500 bg-red-950 text-red-300") + " shadow-2xl";t.style.display="block";setTimeout(()=>{t.style.display="none"},3200)}};

async function boot(){
    const b = Bridge.detect();
    if(b){
        state.root = true; state.bridge = b;
        const badge = document.getElementById("root-badge");
        badge.innerHTML = '<i class="fa-solid fa-shield-check"></i> ' + b.toUpperCase() + ' ROOT';
        badge.className = "px-7 py-2.5 rounded-3xl text-xs font-bold flex items-center gap-3 bg-green-950 text-green-400";
    } else {
        setTimeout(boot, 800); return;
    }
    await loadConfig();
    renderTab(0);
}

async function loadConfig(){
    const cfgPaths = [
        "/data/adb/modules/eaqueldumper/config.json",
        "/data/adb/ksu/modules/eaqueldumper/config.json",
        "/data/local/tmp/eaquel_config.json"
    ];
    for(const p of cfgPaths){
        const raw = await Bridge.godRun('cat "' + p + '" 2>/dev/null');
        if(raw && raw.startsWith("{")){
            try{
                const cfg = JSON.parse(raw);
                if(cfg.outputDir) state.config.outputDir = cfg.outputDir;
                if(cfg.genCpp !== undefined) state.config.genCpp = cfg.genCpp;
                if(cfg.genFrida !== undefined) state.config.genFrida = cfg.genFrida;
                if(cfg.autoKill !== undefined) state.config.autoKill = cfg.autoKill;
            }catch(e){}
            break;
        }
    }
}

async function saveConfig(){
    const cfg = JSON.stringify(state.config, null, 2);
    const escaped = cfg.replace(/'/g, "'\\''");
    const paths = [
        "/data/adb/modules/eaqueldumper",
        "/data/adb/ksu/modules/eaqueldumper",
        "/data/local/tmp"
    ];
    for(const p of paths){
        const r = await Bridge.godRun('mkdir -p "' + p + '" && echo \'' + escaped + '\' > "' + p + '/config.json" && echo OK');
        if(r.includes("OK")){ Toast.show("Config kaydedildi"); return; }
    }
    Toast.show("Config kaydedilemedi");
}

async function scanApps(){
    Toast.show("Taranıyor...");
    state.apps = [];

    const pm = await Bridge.godRun("pm list packages -3 2>/dev/null");
    pm.split("\n").filter(Boolean).forEach(line => {
        const pkg = line.replace("package:","").trim();
        if(pkg) state.apps.push({pkg, name: pkg.split(".").pop()});
    });

    const il2cppCheck = await Bridge.godRun("find /data/app -name 'libil2cpp.so' 2>/dev/null | head -50");
    const il2cppPkgs = new Set();
    il2cppCheck.split("\n").forEach(line => {
        const m = line.match(/\/data\/app\/[^\/]*([a-zA-Z][a-zA-Z0-9_]*(?:\.[a-zA-Z][a-zA-Z0-9_]*)+)/);
        if(m) il2cppPkgs.add(m[1]);
    });

    if(il2cppPkgs.size > 0){
        state.apps = state.apps.filter(a => il2cppPkgs.has(a.pkg));
        il2cppPkgs.forEach(pkg => {
            if(!state.apps.some(a => a.pkg === pkg))
                state.apps.push({pkg, name: pkg.split(".").pop()});
        });
    }

    state.apps = [...new Map(state.apps.map(a=>[a.pkg,a])).values()];
    renderTab(0);
    Toast.show(state.apps.length + " IL2CPP OYUN BULUNDU");
}

function renderApps(){
    let html = '<div class="panel p-6"><div class="flex justify-between mb-5"><h2 class="text-red-500 text-sm font-bold tracking-widest">HEDEF OYUNLAR</h2><div class="text-xs bg-red-950 px-5 py-1 rounded-3xl">' + state.apps.length + ' BULUNDU</div></div><input id="search-input" type="text" placeholder="Oyun ara..." class="w-full bg-black border border-red-900 rounded-3xl px-6 py-4 text-sm focus:border-red-500 mb-5" oninput="state.query=this.value;renderTab(0)">';
    const q = state.query.toLowerCase();
    const filtered = state.apps.filter(a=>!q||a.pkg.toLowerCase().includes(q)||a.name.toLowerCase().includes(q));
    filtered.forEach(a=>{
        const sel = state.target===a.pkg ? "ring-2 ring-red-500 bg-red-950/60" : "";
        html += '<div onclick="selectTarget(\'' + a.pkg + '\',\'' + a.name + '\')" class="card flex items-center gap-4 p-5 rounded-3xl border border-red-900/40 ' + sel + ' mb-4"><div class="w-14 h-14 bg-gradient-to-br from-red-900 to-black rounded-3xl flex items-center justify-center text-3xl"><i class="fa-solid fa-gamepad"></i></div><div class="flex-1"><div class="font-semibold text-white">' + a.name + '</div><div class="text-red-400 text-xs truncate">' + a.pkg + '</div></div>' + (state.target===a.pkg ? '<i class="fa-solid fa-circle-check text-green-400 text-4xl"></i>' : '') + '</div>';
    });
    if(filtered.length===0) html += '<div class="text-center py-16 text-red-400/80">Henüz oyun bulunamadı<br><span class="text-xs">TARA butonuna bas</span></div>';
    html += '</div>';
    return html;
}

function selectTarget(pkg,name){state.target=pkg;renderTab(0);}

async function inject(){
    if(!state.target){Toast.show("Önce oyun seç");return;}
    const cfg = "pkg=" + state.target + "\noutdir=" + state.config.outputDir + "\ngen_cpp=" + (state.config.genCpp?1:0) + "\ngen_frida=" + (state.config.genFrida?1:0);
    const escaped = cfg.replace(/'/g,"'\\''");

    const modPaths = [
        "/data/adb/modules/eaqueldumper",
        "/data/adb/ksu/modules/eaqueldumper"
    ];
    for(const p of modPaths){
        const r = await Bridge.godRun('[ -d "' + p + '" ] && echo exists');
        if(r.includes("exists")){
            await Bridge.godRun("printf '" + escaped + "' > \"" + p + "/target.cfg\"");
            break;
        }
    }

    if(state.config.autoKill) await Bridge.godRun("am force-stop " + state.target);
    await Bridge.godRun("monkey -p " + state.target + " -c android.intent.category.LAUNCHER 1");
    Toast.show("ZYGISK ENJEKTE EDİLDİ • DUMP BAŞLADI");
    renderTab(3);
}

async function killTarget(){if(!state.target)return;await Bridge.godRun("am force-stop " + state.target);Toast.show("Oyun kapatıldı");}

async function pullFile(f){
    if(!state.target)return;
    const d = state.config.outputDir;
    const cmd = 'mkdir -p /sdcard/EaquelDumps && cp "' + d + '/' + f + '" "/sdcard/EaquelDumps/' + state.target + '_' + f + '" 2>/dev/null && echo "[OK] ' + f + ' çekildi" || echo "[ERR] ' + f + ' yok"';
    const r = await Bridge.godRun(cmd);
    Toast.show(r.includes("OK") ? "Dosya çekildi!" : r);
}

async function pullAll(){await pullFile("dump.cs");await pullFile("dump.h");await pullFile("dump.js");}

async function pullApk(){
    if(!state.target)return;
    const p = await Bridge.godRun("pm path " + state.target);
    const line = p.split("\n").find(l=>l.includes("base.apk"));
    if(line){
        const apk = line.replace("package:","").trim();
        await Bridge.godRun('cp "' + apk + '" "/sdcard/EaquelDumps/' + state.target + '_base.apk"');
        Toast.show("BASE.APK çekildi");
    }
}

function runTerm(){
    const input = document.getElementById("term-input");
    const cmd = input.value.trim();
    if(!cmd) return;
    input.value = "";
    const out = document.getElementById("term-out");
    out.innerHTML += '<div class="text-red-400">[' + new Date().toLocaleTimeString() + '] $ ' + cmd + '</div>';
    Bridge.godRun(cmd).then(res=>{
        out.innerHTML += '<div class="text-gray-200">' + (res || "[çıktı yok]") + '</div>';
        out.scrollTop = out.scrollHeight;
    });
}

let livePoller = null;
function startLiveLog(){
    if(livePoller) return;
    livePoller = setInterval(async()=>{
        if(!state.root || !state.target) return;
        const log = await Bridge.godRun("logcat -d -s Eaquel:* 2>/dev/null | tail -n 30");
        if(log){
            const lines = log.split("\n").filter(l=>l.length>10);
            lines.forEach(l=>{
                if(!state.logs.includes(l)){
                    state.logs.push(l);
                    const out = document.getElementById("term-out");
                    if(out) out.innerHTML += '<div class="text-purple-400">' + l + '</div>';
                    if(out) out.scrollTop = out.scrollHeight;
                }
            });
        }
    },1000);
}

function retryBoot(){
    const badge = document.getElementById("root-badge");
    badge.innerHTML = '<i class="fa-solid fa-spinner fa-spin"></i> DENİYOR';
    setTimeout(boot,500);
}

function switchTab(n){
    const main = document.getElementById("main");
    document.querySelectorAll(".nav-btn").forEach((b,i)=>b.classList.toggle("active",i===n));
    if(n===0){
        main.innerHTML = '<div class="space-y-6">' + renderApps() + '<div onclick="scanApps()" class="panel p-6 cursor-pointer"><button class="btn-primary w-full py-7 text-2xl font-bold rounded-3xl flex items-center justify-center gap-5"><i class="fa-solid fa-radar"></i>IL2CPP OYUNLARINI TARA</button></div>' + (state.target ? '<button onclick="inject()" class="btn-primary w-full py-7 text-xl font-bold rounded-3xl">ENJEKTE ET → ' + state.target + '</button>' : '') + '</div>';
    }
    if(n===1){
        main.innerHTML = '<div class="panel p-7 space-y-8"><h2 class="text-red-500 text-sm font-bold tracking-widest">KONFIGÜRASYON</h2><div><label class="block text-xs text-red-400 mb-2">ÇIKIŞ KLASÖRÜ</label><input value="' + state.config.outputDir + '" class="w-full bg-black border border-red-900 rounded-3xl px-7 py-6 text-sm" onchange="state.config.outputDir=this.value"></div><div class="flex justify-between items-center"><span class="text-base">C++ Header Üret</span><input type="checkbox" ' + (state.config.genCpp?"checked":"") + ' onchange="state.config.genCpp=this.checked" class="w-14 h-8 accent-red-600"></div><div class="flex justify-between items-center"><span class="text-base">Frida Script Üret</span><input type="checkbox" ' + (state.config.genFrida?"checked":"") + ' onchange="state.config.genFrida=this.checked" class="w-14 h-8 accent-red-600"></div><div class="flex justify-between items-center"><span class="text-base">Otomatik Kapat</span><input type="checkbox" ' + (state.config.autoKill?"checked":"") + ' onchange="state.config.autoKill=this.checked" class="w-14 h-8 accent-red-600"></div><button onclick="saveConfig()" class="btn-primary w-full py-6 rounded-3xl text-xl mt-4">KAYDET VE UYGULA</button></div>';
    }
    if(n===2){
        main.innerHTML = '<div class="space-y-7"><div class="panel p-7"><h2 class="text-red-500 text-sm font-bold tracking-widest mb-6">DUMP DOSYALARINI ÇEK</h2><button onclick="pullFile(\'dump.cs\')" class="w-full py-6 border border-green-500 text-green-400 rounded-3xl mb-4 flex justify-between px-7 items-center"><span class="font-semibold">dump.cs</span><i class="fa-solid fa-download text-xl"></i></button><button onclick="pullFile(\'dump.h\')" class="w-full py-6 border border-blue-500 text-blue-400 rounded-3xl mb-4 flex justify-between px-7 items-center"><span class="font-semibold">dump.h</span><i class="fa-solid fa-download text-xl"></i></button><button onclick="pullFile(\'dump.js\')" class="w-full py-6 border border-purple-500 text-purple-400 rounded-3xl mb-4 flex justify-between px-7 items-center"><span class="font-semibold">dump.js</span><i class="fa-solid fa-download text-xl"></i></button><button onclick="pullAll()" class="btn-primary w-full py-6 rounded-3xl">HEPSİNİ ÇEK</button></div><div class="panel p-7"><button onclick="pullApk()" class="w-full py-6 border border-amber-400 text-amber-400 rounded-3xl flex justify-between px-7"><span class="font-semibold">BASE.APK ÇEK</span><i class="fa-solid fa-file-export text-xl"></i></button></div></div>';
    }
    if(n===3){
        main.innerHTML = '<div class="panel flex flex-col h-[calc(100dvh-200px)]"><div class="px-6 py-5 border-b border-red-900 flex justify-between text-xs font-bold"><span>ZYGISK LIVE TERM</span><i onclick="document.getElementById(\'term-out\').innerHTML=\'\';state.logs=[]" class="fa-solid fa-trash cursor-pointer"></i></div><div id="term-out" class="flex-1 p-6 term overflow-y-auto text-gray-200"></div><div class="p-5 border-t border-red-900 flex"><input id="term-input" placeholder="Komut gir..." class="flex-1 bg-black border border-red-900 rounded-3xl px-7 py-5 text-sm focus:outline-none" onkeypress="if(event.key===\'Enter\')runTerm()"><button onclick="runTerm()" class="ml-4 px-9 bg-red-600 rounded-3xl font-bold text-lg">ÇALIŞTIR</button></div></div>';
        startLiveLog();
    }
}

document.addEventListener("DOMContentLoaded",()=>{boot()});
</script>
</body>
</html>
